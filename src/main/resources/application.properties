# Server Configuration
server.port=8599

# Database Configuration
# Use env vars when available, otherwise default to local PostgreSQL for development.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/salvation_army_db}
spring.datasource.username=postgres
spring.datasource.password=${DATABASE_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# Spring Data JPA (as requested for VM debugging; consider validate + Flyway only for stable production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# File Upload Configuration
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB
app.upload.dir=${APP_UPLOAD_DIR:uploads/}

# WhatsApp Configuration
whatsapp.meta.verify-token=${META_VERIFY_TOKEN:salvationBot2026}
whatsapp.meta.phone-number-id=${META_PHONE_NUMBER_ID:952859751239210}
whatsapp.meta.api-url=https://graph.facebook.com/v19.0
whatsapp.meta.access-token=${WHATSAPP_ACCESS_TOKEN:${META_ACCESS_TOKEN:}}
# New generic WhatsApp config keys (for Cloud API setup)
whatsapp.phoneNumberId=${whatsapp.meta.phone-number-id}
whatsapp.verifyToken=${whatsapp.meta.verify-token}
whatsapp.accessToken=${whatsapp.meta.access-token}
whatsapp.apiUrl=${whatsapp.meta.api-url}

# JWT Configuration
jwt.secret=${JWT_SECRET:your-very-long-secret-key-at-least-256-bits-for-hs256-algorithm}
jwt.expiration=86400000

# Admin Credentials
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin123}

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://102.37.140.130}

# NOTE: Backend now runs on port 8599

# --- Chat OTP email (Spring Mail) ---
# Emails are NOT sent unless MAIL_ENABLED=true and host/username/password are set.
# Without SMTP, OTP is only shown in server logs if app.otp.dev-mode=true (default for local dev).
spring.mail.enabled=${MAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Sender address (many providers require this to match the mailbox)
app.mail.from=${MAIL_FROM:}
app.otp.dev-mode=${OTP_DEV_MODE:true}
app.otp.rate-limit-seconds=${OTP_RATE_LIMIT_SECONDS:30}

# Logging
logging.level.org.salvationarmy=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
